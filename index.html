<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Moacir Pereira</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="src/assets/css/styles-comum.css"/>
    <link rel="stylesheet" href="src/assets/css/blog-style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<body>

<header class="main-header">
    <div class="header-container">
        <a href="index.html" class="logo">Moacir Pereira</a>

        <div class="header-search">
            <input type="text" id="search-input" class="search-input" placeholder="Buscar..." onkeyup="filtrarPorTexto()">
            <i class="fas fa-search search-icon"></i>
        </div>

        <nav class="nav-menu">
            <a href="index.html" class="nav-link active">Blog</a>
            <a href="about.html" class="nav-link">Sobre</a>
            <a href="tools.html" class="nav-link">Apps</a>
            <button id="theme-toggle" class="theme-btn" aria-label="Alternar Tema">
                <i class="fas fa-moon"></i>
            </button>
        </nav>
    </div>
</header>

<!-- Filtros -->
<div class="filtros" style="margin-top: 30px;">
    <button class="btn-filtro ativo" onclick="filtrar('noticia')">Artigos</button>
    <button class="btn-filtro" onclick="filtrar('projeto')">Projetos</button>
</div>

<main id="feed" class="feed-container">
    <!-- O JavaScript vai injetar os posts aqui -->
</main>

<script src="src/assets/javascript/theme.js"></script>
<script src="src/assets/javascript/blog.js"></script>
<script src="src/assets/javascript/lightbox.js"></script>

</body>
</html>
