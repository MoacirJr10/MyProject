<!doctype html>
<html lang="pt-BR">
  <head>
    <title>Artigo | Moacir Pereira</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/css/variables.css" />
    <link rel="stylesheet" href="src/frontend/css/styles-comum.css" />
    <link rel="stylesheet" href="src/frontend/css/typography.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Biblioteca para renderizar Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
  </head>

  <body>
    <header class="main-header">
      <div class="header-container">
        <a href="index.html" class="logo">Moacir Pereira</a>
        <nav class="nav-menu">
          <a href="index.html" class="nav-link">Blog</a>
          <a href="about.html" class="nav-link">Sobre</a>
          <a href="tools.html" class="nav-link">Apps</a>
          <button id="theme-toggle" class="theme-btn">
            <i class="fas fa-moon"></i>
          </button>
        </nav>
      </div>
    </header>

    <main class="detalhe-container">
      <a href="index.html" class="btn-voltar">← Voltar</a>

      <div id="conteudo-post">
        <p style="text-align: center">Carregando...</p>
      </div>
    </main>

    <script src="src/frontend/javascript/theme.js"></script>
    <script src="src/frontend/javascript/lightbox.js"></script>

    <script type="module">
      import Navigation from "./src/js/modules/navigation.js";

      document.addEventListener("DOMContentLoaded", () => {
        Navigation.init();
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get("id"));

        if (!id) {
          window.location.href = "index.html";
          return;
        }

        try {
          const response = await fetch("src/data/posts.json");
          const posts = await response.json();
          const post = posts.find((p) => p.id === id);

          if (post) {
            const container = document.getElementById("conteudo-post");

            // Busca o conteúdo do arquivo Markdown
            const markdownResponse = await fetch(
              `src/data/posts/${post.arquivo}`,
            );
            const markdownText = await markdownResponse.text();
            const htmlContent = marked.parse(markdownText); // Converte para HTML
            const safeHtmlContent = DOMPurify.sanitize(htmlContent);

            let botoesHtml = "";
            if (post.github)
              botoesHtml += `<a href="${post.github}" target="_blank" rel="noopener noreferrer" class="btn"><i class="fab fa-github"></i> Ver no GitHub</a>`;
            if (post.demo)
              botoesHtml += `<a href="${post.demo}" rel="noopener noreferrer" class="btn"><i class="fas fa-play"></i> Testar App</a>`;

            container.innerHTML = `
                    <div class="detalhe-header">
                        <div class="detalhe-meta">${post.categoria} • ${post.data}</div>
                        <h1 class="detalhe-titulo">${post.titulo}</h1>
                    </div>
                    <div class="img-container">
                        <img src="${post.imagem}" alt="${post.titulo}" class="img-artigo">
                    </div>
                    <div class="detalhe-texto">${safeHtmlContent}</div>
                    <div class="detalhe-botoes">${botoesHtml}</div>
                `;
          } else {
            document.getElementById("conteudo-post").innerHTML =
              "<p>Post não encontrado.</p>";
          }
        } catch (e) {
          console.error(e);
          document.getElementById("conteudo-post").innerHTML =
            "<p>Erro ao carregar.</p>";
        }
      });
    </script>
  </body>
</html>
