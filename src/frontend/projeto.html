<!doctype html>
<html lang="pt-BR">
  <head>
    <title>Ferramentas | Moacir Pereira</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="css/styles-comum.css" />
    <link rel="stylesheet" href="css/styles-aba2.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <header class="main-header">
      <div class="header-container">
        <a href="../../index.html" class="logo">Moacir Pereira</a>
        <div class="header-search">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Buscar..."
          />
          <i class="fas fa-search search-icon"></i>
        </div>
        <nav class="nav-menu">
          <a href="../../index.html" class="nav-link">Blog</a>
          <a href="../../sobre.html" class="nav-link">Sobre</a>
          <a href="projeto.html" class="nav-link active">Apps</a>
          <button
            id="theme-toggle"
            class="theme-btn"
            aria-label="Alternar Tema"
          >
            <i class="fas fa-moon"></i>
          </button>
        </nav>
      </div>
    </header>

    <div class="app-layout">
      <!-- Menu Lateral -->
      <nav class="menu-lateral">
        <ul id="menu-apps">
          <li data-tab="cubica">
            <i class="fas fa-cube"></i> <span>Blocos</span>
          </li>
          <li data-tab="fumigacao-silo">
            <i class="fas fa-warehouse"></i> <span>Silo</span>
          </li>
          <li data-tab="area">
            <i class="fas fa-ruler-combined"></i> <span>Área</span>
          </li>
          <li data-tab="conversoes">
            <i class="fas fa-exchange-alt"></i> <span>Conversão</span>
          </li>
          <li data-tab="historico">
            <i class="fas fa-history"></i> <span>Histórico</span>
          </li>
        </ul>
      </nav>

      <!-- Área de Conteúdo -->
      <div class="app-container">
        <div id="cubica" class="tab-content" style="display: none">
          <h3>Fumigação em Blocos</h3>
          <div class="form-grid">
            <input type="number" id="altura" placeholder="Altura (m)" />
            <input type="number" id="largura" placeholder="Largura (m)" />
            <input
              type="number"
              id="comprimento"
              placeholder="Comprimento (m)"
            />
          </div>
          <button id="btn-calcular-cubica" class="btn">Calcular</button>
          <div id="resultado" class="result"></div>
        </div>

        <div id="fumigacao-silo" class="tab-content" style="display: none">
          <h3>Fumigação em Silo</h3>
          <div class="form-grid">
            <input type="number" id="diametroSilo" placeholder="Diâmetro (m)" />
            <input type="number" id="alturaSilo" placeholder="Altura (m)" />
            <select id="tipoMaterial">
              <option value="milho">Milho</option>
              <option value="soja">Soja</option>
              <option value="arroz">Arroz</option>
              <option value="amendoim">Amendoim</option>
              <option value="sorgo">Sorgo</option>
            </select>
          </div>
          <button id="btn-calcular-silo" class="btn">Calcular</button>

          <div
            style="
              margin-top: 20px;
              border-top: 1px solid var(--border-color);
              padding-top: 10px;
            "
          >
            <p style="font-size: 0.9rem; color: var(--text-secondary)">
              Não sabe o diâmetro?
            </p>
            <div style="display: flex; gap: 10px">
              <input
                type="number"
                id="circunferenciaSilo"
                placeholder="Circunferência (m)"
              />
              <button id="btn-converter-diametro" class="btn">Converter</button>
            </div>
          </div>
          <div id="diametro-result"></div>
          <div id="resultadoFumigacaoSilo" class="result"></div>
        </div>

        <div id="area" class="tab-content" style="display: none">
          <h3>Cálculo de Área</h3>
          <div class="form-grid">
            <input
              type="number"
              id="larguraArea"
              placeholder="Largura (m)"
              min="0"
            />
            <input
              type="number"
              id="comprimentoArea"
              placeholder="Comprimento (m)"
              min="0"
            />
          </div>
          <button id="btn-calcular-area" class="btn">Calcular</button>
          <div id="resultadoArea" class="result"></div>
        </div>

        <div id="conversoes" class="tab-content" style="display: none">
          <h3>Conversões</h3>
          <input type="number" id="metros" placeholder="Metros (m)" />
          <div
            id="botoes-conversao"
            style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px"
          >
            <button class="btn" data-unit="cm">para cm</button>
            <button class="btn" data-unit="km">para km</button>
            <button class="btn" data-unit="milhas">para milhas</button>
          </div>
          <div id="resultadoConversao" class="result"></div>
        </div>

        <div id="historico" class="tab-content" style="display: none">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <h3>Histórico</h3>
            <button
              id="btn-limpar-historico"
              class="btn"
              style="border-color: #ff4444; color: #ff4444"
            >
              Limpar
            </button>
          </div>
          <div class="historico-container" style="margin-top: 15px"></div>
        </div>
      </div>
    </div>

    <!-- CORREÇÃO DO CAMINHO DO SCRIPT -->
    <script src="javascript/theme.js"></script>
    <script type="module">
      import Navigation from "../js/modules/navigation.js";
      import Calculator from "../js/modules/calculator.js";

      document.addEventListener("DOMContentLoaded", () => {
        Navigation.init();
        window.Calculator = Calculator;
        console.log("✅ Ferramentas carregadas");
      });
    </script>
  </body>
</html>
